rules:
  - name: "HighTemperatureAlert"
    description: "Alerts when temperature is >50 for 500ms"
    conditions:
      all:
        - condition:
            type: threshold_over_time
            sensor: temperature
            threshold: 50
            duration: 500ms
    actions:
      - set_value:
          key: "alerts:temperature"
          value: "1"
      - send_message:
          channel: "alerts"
          message: "Temperature too high!"

  - name: "HumidityPressureCheck"
    description: "Monitors combined humidity and pressure conditions"
    conditions:
      any:
        - condition:
            type: comparison
            sensor: humidity
            operator: ">"
            value: 80
        - condition:
            type: comparison
            sensor: pressure
            operator: "<"
            value: 980
    actions:
      - set_value:
          key: "alerts:humidity"
          value: "1"
      - set_value:
          key: "alerts:pressure"
          value: "1"

  - name: "TemperatureConversion"
    description: "Converts temperature from F to C when above threshold"
    conditions:
      all:
        - condition:
            type: expression
            expression: "(temperature - 32) * (5/9) > 25"  # Convert to Celsius and check if > 25°C
    actions:
      - set_value:
          key: "converted_temp"
          value_expression: "(temperature - 32) * (5/9)"

  - name: "SystemStatusUpdate"
    description: "Updates system status based on multiple conditions"
    conditions:
      all:
        - condition:
            type: expression
            expression: "alerts:temperature == 0 && alerts:humidity == 0 && alerts:pressure == 0"
    actions:
      - set_value:
          key: "system:status"
          value: "healthy"
